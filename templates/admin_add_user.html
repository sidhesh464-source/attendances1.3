{% extends 'base.html' %}

{% block content %}
<div class="login-container">
    <div class="card">
        <h2 style="text-align: center;">Add {{ role_type|capitalize }}</h2>
        <form method="POST">
            <label>Name</label>
            <input type="text" name="name" placeholder="Full Name" required>

            <label>Registration No / Username</label>
            <input type="text" name="username" placeholder="Unique ID (Reg No)" required>

            {% if role_type == 'faculty' %}
            <label>Department</label>
            <input type="text" name="department" placeholder="Department" required>
            {% endif %}

            <p style="font-size: 0.9rem; color: #666; margin-bottom: 1rem;">
                Default password will be set to: <strong>welcome</strong>
            </p>

            <button type="submit" style="width: 100%;">Add {{ role_type|capitalize }}</button>
        </form>
        <div style="text-align: center; margin-top: 1rem;">
            <a href="{{ url_for('admin_dashboard') }}" style="color: var(--primary-color);">Cancel</a>
        </div>
    </div>
</div>
{% endblock %}
